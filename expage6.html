静岡大学紹介 その１
私が所属している静岡大学を紹介します。静岡大学は静岡県にある国立系の総合大学で、以下の特徴を持ってい
ます。
規模と歴史
２つのキャンパスと６つの学部
静岡大学は、静岡キャンパスと浜松キャンパスの２つのキャンパスからなります。静岡キャンパスには人文社会
科学部、理学部、教育学部、農学部が、浜松キャンパスには工学部と情報学部があります。学生の数は両キャン
パスあわせて約一万人です。
２つの歴史
静岡キャンパスは静岡師範学校が、浜松キャンパスは浜松高等工業学校が前身です。静岡キャンパスは、昔は静
岡の葵区にありましたが、現在は郊外の大谷という丘陵地にあります。浜松キャンパスは、はじめは広沢(現在の
浜松市立高校付近)にありましたが、そこが戦時中に空襲で焼けたため、陸軍の演習地だった城北に移りました。
これが現在の浜松キャンパスです。
地理や気候
日本の中央部
静岡大学は日本のほぼ中央付近にあります。文化的には関東とも関西ともつかないことが多いですが、静岡キャ
ンパスは東京の影響が、浜松キャンパスは名古屋の影響が強いとも言われています。いずれも東海道筋なので交
通の便は比較的良いです。ただし静岡県内の駅には新幹線「のぞみ」は止まりません。
気候が温暖
静岡・浜松ともに温暖で、冬でも雪が降りません。一方、残念ながら夏は普通に暑いです。また、浜松は春に強
い風が吹きます。そのため５月に凧揚げをするお祭りがあります。
